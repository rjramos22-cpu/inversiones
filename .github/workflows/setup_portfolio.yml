name: Setup Portfolio (Save)

on:
  workflow_dispatch:
    inputs:
      portfolio_json:
        description: "Pega aqui tu portafolio JSON (GBM + Bitso)"
        required: true

permissions:
  contents: write

jobs:
  save-portfolio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write portfolio file
        run: |
          mkdir -p data
          cat > data/portfolio.json << 'EOF'
          ${{ inputs.portfolio_json }}
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/portfolio.json
          git commit -m "Update portfolio.json" || echo "No changes to commit"
          git push
